name: Deploy Explore SG App

on:
  push:
    branches: [main]
    paths:
      - 'apps/explore-sg-app/**'

defaults:
  run:
    working-directory: apps/explore-sg-app

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "apps/explore-sg-app/dist/*"
          target: /home/ubuntu/explore-sg-app/
          strip_components: 3

      - name: Restart PM2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: pm2 restart explore-sg-app
